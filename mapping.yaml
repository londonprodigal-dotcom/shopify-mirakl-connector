# ─── Product field mappings (combined template, cols 1–163) ───────────────────
productFieldMappings:
  "product_category":         "mapped:product.productType"
  "parent_product_id":        "field:product.numericId"
  "product_id":               "field:variant.numericId"
  "ean":                      "field:variant.barcode"
  "product_title":            "field:product.title"
  "long_description":         "field:product.description"
  "colour":                   "option:color"
  "colourfacet":              "colorfacet:color"
  "gender":                   "default:gender"
  "main_image":               "image:0"
  # Debenhams supports main + 5 additional images (per guidelines)
  "image_(additional_1)":     "image:1"
  "image_(additional_2)":     "image:2"
  "image_(additional_3)":     "image:3"
  "image_(additional_4)":     "image:4"
  "image_(additional_5)":     "image:5"
  # Swatch is mandatory — use first product image as fallback if no dedicated swatch
  "swatch":                   "image:0"
  "item_weight":              "field:variant.weight"
  # Returns: Standard | Hygiene | Nonrefundable
  # Override per product_type in categoryMappings or set per-product via tags (tag:returns)
  "returns":                  "default:returns"
  # Size attributes — only one will be non-blank per product type
  "size_womens":              "option:size"
  "size_wtrousersjeans":      "option:size"
  "size_lingerieswim":        "option:size"

# ─── Offer field mappings ─────────────────────────────────────────────────────
# Used for combined template (cols 164–181), prices template, and stock template
offerFieldMappings:
  # Combined + prices template
  "sku":                      "field:variant.sku"
  "offer-sku":                "field:variant.sku"   # prices & stock templates use offer-sku
  "product-id":               "field:variant.barcode"
  "product-id-type":          "static:EAN"
  "description":              "field:product.description"
  "price":                    "field:variant.price"
  "discount-price":           "field:variant.compareAtPrice"
  "discount-start-date":      "static:"
  "discount-end-date":        "static:"
  # Stock template
  "quantity":                 "field:variant.inventoryQuantity"
  "warehouse-code":           "static:"
  # Shared
  "state":                    "default:state_label"
  "leadtime-to-ship":         "default:leadtime_to_ship"
  "update-delete":            "default:update_delete"
  "min-quantity-alert":       "static:5"
  "logistic-class":           "static:"
