# ─────────────────────────────────────────────────────────────────────────────
# Shopify → Mirakl / Debenhams Mapping Configuration
# ─────────────────────────────────────────────────────────────────────────────

defaults:
  state_code: "11"
  state_label: "New"
  leadtime_to_ship: 3
  currency: "GBP"
  update_delete: "U"
  gender: "Women"
  # Returns: must be exactly one of: Standard | Hygiene | Nonrefundable
  # Hygiene = swimwear, lingerie, face masks, pierced jewellery, cosmetics
  # Nonrefundable = perishable/custom items
  # Standard = everything else
  returns: "Standard"

# ─── Shopify product_type → Mirakl product_category code ─────────────────────
